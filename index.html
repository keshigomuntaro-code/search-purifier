<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEARCH PURIFIER - Mobile Ready</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #05070a; --card: #111827; --accent: #3b82f6; --text: #f3f4f6; --input: #1f2937; --success: #10b981; --danger: #f87171; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 800px; }
        
        /* カードデザイン */
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #2d3748; margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        h1 { text-align: center; color: var(--accent); font-size: 20px; margin: 10px 0 20px; letter-spacing: 2px; }
        
        /* 入力エリア */
        textarea, input, select { width: 100%; background: var(--input); border: 1px solid #374151; border-radius: 12px; padding: 14px; color: white; box-sizing: border-box; outline: none; margin-bottom: 10px; font-size: 16px; /* 16px以上にするとiPhoneでズームされない */ }
        
        /* ボタン */
        .btn { border: none; padding: 14px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; display: inline-flex; justify-content: center; align-items: center; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; margin-top: 5px; }
        
        /* タグ */
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; max-height: 200px; overflow-y: auto; }
        .tag { background: #374151; padding: 6px 14px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; border: 1px solid #4b5563; }
        .tag span { margin-left: 10px; color: var(--danger); font-weight: bold; padding: 2px 5px; }

        /* 掲示板グリッド（ここが重要） */
        .board-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        /* スマホ向けメディアクエリ（画面幅600px以下の時） */
        @media (max-width: 600px) {
            .board-grid { grid-template-columns: 1fr; /* 1列にする */ }
            .btn { width: 100%; }
            .search-row { flex-direction: column; }
            h1 { font-size: 18px; }
            .card { padding: 15px; }
        }

        .post-card { background: #1f2937; padding: 16px; border-radius: 16px; border: 1px solid #374151; position: relative; }
        .post-category { font-size: 10px; color: var(--accent); font-weight: bold; margin-bottom: 4px; }
        .post-title { font-weight: bold; font-size: 15px; margin-bottom: 8px; line-height: 1.3; }
        .post-desc { font-size: 12px; color: #9ca3af; margin-bottom: 15px; }
        
        .btn-delete { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #4b5563; font-size: 20px; padding: 5px; }
        .btn-apply { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); color: var(--accent); font-size: 13px; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <h1>SEARCH PURIFIER</h1>

    <div class="card">
        <div class="search-row" style="display: flex; gap:10px;">
            <input type="text" id="mainQuery" placeholder="検索ワード...">
            <button class="btn btn-primary" onclick="search()">浄化検索</button>
        </div>
        
        <div style="margin-top: 15px;">
            <div style="font-size: 11px; color: #718096; font-weight: bold; margin-bottom: 8px;">🚫 マイ・ブラックリスト</div>
            <div id="tagDisplay" class="tag-list"></div>
            <div class="search-row" style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="quickInput" placeholder="除外単語を追加..." style="margin-bottom:0;">
                <button class="btn btn-primary" onclick="addQuick()" style="padding: 10px 15px;">追加</button>
            </div>
        </div>
    </div>

    <div class="card" style="border-color: var(--success);">
        <details>
            <summary style="color: var(--success); cursor: pointer; font-weight: bold; font-size: 14px;">🌍 コミュニティへ投稿する</summary>
            <div style="margin-top: 15px;">
                <select id="postCategory">
                    <option value="全般">全般</option>
                    <option value="エンジニア">エンジニア</option>
                    <option value="ゲーム">ゲーム</option>
                    <option value="ライフハック">ライフハック</option>
                </select>
                <input type="text" id="postTitle" placeholder="題名（例：ゲーム攻略用）">
                <textarea id="postDesc" rows="2" placeholder="説明文"></textarea>
                <textarea id="postList" rows="2" placeholder="除外リスト（改行区切り）"></textarea>
                <input type="password" id="postPass" placeholder="削除用パスワード">
                <button class="btn btn-success" onclick="submitToFirebase()">投稿を公開</button>
            </div>
        </details>
    </div>

    <input type="text" id="boardSearch" placeholder="プリセットを検索..." oninput="filterPosts()">
    <div id="board" class="board-grid"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://good-95eb2-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let myExcludes = JSON.parse(localStorage.getItem('purifier_mobile_v1')) || [];
    let allPosts = [];

    function parseInput(str) { return str.split(/[\n,、\s]+/).map(s => s.trim()).filter(s => s !== ""); }

    function renderMyList() {
        localStorage.setItem('purifier_mobile_v1', JSON.stringify(myExcludes));
        const display = document.getElementById('tagDisplay');
        display.innerHTML = myExcludes.map((t, i) => `<div class="tag">${t}<span onclick="removeTag(${i})">×</span></div>`).join('');
    }

    function addQuick() {
        const input = document.getElementById('quickInput');
        const items = parseInput(input.value);
        myExcludes = Array.from(new Set([...myExcludes, ...items]));
        input.value = '';
        renderMyList();
    }

    function removeTag(i) { myExcludes.splice(i, 1); renderMyList(); }

    database.ref('posts').on('value', (snapshot) => {
        const data = snapshot.val();
        allPosts = data ? Object.keys(data).map(key => ({id: key, ...data[key]})).reverse() : [];
        filterPosts();
    });

    function filterPosts() {
        const searchText = document.getElementById('boardSearch').value.toLowerCase();
        const board = document.getElementById('board');
        board.innerHTML = '';

        allPosts.filter(p => p.title.toLowerCase().includes(searchText) || p.desc.toLowerCase().includes(searchText)).forEach(post => {
            board.innerHTML += `
                <div class="post-card">
                    <div class="post-category">${post.category || '全般'}</div>
                    <button class="btn-delete" onclick="deletePost('${post.id}', '${post.pass}')">×</button>
                    <div class="post-title">${post.title}</div>
                    <div class="post-desc">${post.desc}</div>
                    <button class="btn-apply" onclick="applyList(\`${post.list}\`)">合体</button>
                </div>`;
        });
    }

    function submitToFirebase() {
        const title = document.getElementById('postTitle').value.trim();
        const desc = document.getElementById('postDesc').value.trim();
        const category = document.getElementById('postCategory').value;
        const pass = document.getElementById('postPass').value;
        const listArr = parseInput(document.getElementById('postList').value);

        if(!title || listArr.length === 0) return alert("入力が足りないよ！");

        database.ref('posts').push({ title, desc, category, pass, list: listArr.join(','), timestamp: Date.now() });
        alert("公開しました！");
    }

    function deletePost(id, correctPass) {
        const userPass = prompt("削除パスワードを入力：");
        if (userPass === correctPass) {
            database.ref('posts').child(id).remove();
        } else {
            alert("パスワードが違います");
        }
    }

    function applyList(listStr) {
        myExcludes = Array.from(new Set([...myExcludes, ...listStr.split(',')]));
        renderMyList();
        alert("合体完了！");
    }

    function search() {
        const q = document.getElementById('mainQuery').value;
        if(!q) return;
        const cmd = myExcludes.map(i => i.includes('.') ? `-site:${i}` : `-${i}`).join(' ');
        window.open(`https://www.google.com/search?q=${encodeURIComponent(q + " " + cmd)}`, '_blank');
    }

    renderMyList();
</script>
</body>
</html>
