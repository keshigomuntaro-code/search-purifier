<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SEARCH PURIFIER - Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #05070a; --card: #111827; --accent: #3b82f6; --text: #f3f4f6; --input: #1f2937; --success: #10b981; --danger: #f87171; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 800px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #2d3748; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--accent); font-size: 24px; margin: 0 0 20px; }
        
        textarea, input, select { width: 100%; background: var(--input); border: 1px solid #374151; border-radius: 10px; padding: 12px; color: white; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .btn { border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; }
        
        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; max-height: 120px; overflow-y: auto; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .tag { background: #374151; padding: 4px 12px; border-radius: 20px; font-size: 11px; display: flex; align-items: center; border: 1px solid #4b5563; }
        .tag span { margin-left: 8px; color: var(--danger); cursor: pointer; font-weight: bold; }

        .board-filter { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-chip { background: #1f2937; border: 1px solid #374151; padding: 6px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; color: #9ca3af; }
        .filter-chip.active { background: var(--accent); color: white; }

        .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .post-card { background: #1f2937; padding: 18px; border-radius: 15px; border: 1px solid #374151; position: relative; }
        .post-category { font-size: 10px; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        .post-title { font-weight: bold; font-size: 16px; margin-bottom: 8px; padding-right: 30px; }
        .post-desc { font-size: 12px; color: #9ca3af; margin-bottom: 15px; line-height: 1.4; }
        
        .btn-delete { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #4b5563; cursor: pointer; font-size: 16px; }
        .btn-delete:hover { color: var(--danger); }
        .btn-apply { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-size: 12px; padding: 8px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-apply:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="app">
    <div class="card">
        <h1>SEARCH PURIFIER</h1>
        <div style="display: flex; gap:10px;">
            <input type="text" id="mainQuery" placeholder="検索ワードを入力...">
            <button class="btn btn-primary" onclick="search()">浄化検索</button>
        </div>

        <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid #2d3748;">
            <div style="font-size: 11px; color: #718096; font-weight: bold;">🚫 マイ・ブラックリスト</div>
            <div id="tagDisplay" class="tag-list"></div>
            <div style="display:flex; gap:10px;">
                <textarea id="quickInput" rows="1" placeholder="除外ワードを改行・スペース・カンマで一括追加..." style="margin-bottom:0;"></textarea>
                <button class="btn btn-primary" onclick="addQuick()">追加</button>
            </div>
        </div>
    </div>

    <div class="card" style="border-color: var(--success);">
        <h3 style="margin-top:0; font-size: 16px; color: var(--success);">🌍 コミュニティへ公開</h3>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
            <input type="text" id="postTitle" placeholder="題名（例：ゲーム攻略特化）">
            <select id="postCategory">
                <option value="全般">全般</option>
                <option value="エンジニア">エンジニア</option>
                <option value="ゲーム">ゲーム</option>
                <option value="ライフハック">ライフハック</option>
            </select>
        </div>
        <textarea id="postDesc" rows="2" placeholder="説明文"></textarea>
        <textarea id="postList" rows="2" placeholder="除外リスト（改行・スペース・カンマ区切り）"></textarea>
        <input type="password" id="postPass" placeholder="削除用パスワード（任意）" style="width: 200px; font-size: 12px;">
        <button class="btn btn-success" onclick="submitToFirebase()">同期公開する</button>
    </div>

    <div style="margin-bottom: 20px;">
        <input type="text" id="boardSearch" placeholder="プリセットを検索..." oninput="filterPosts()">
        <div class="board-filter" id="filterArea">
            <div class="filter-chip active" onclick="setFilter('すべて')">すべて</div>
            <div class="filter-chip" onclick="setFilter('エンジニア')">エンジニア</div>
            <div class="filter-chip" onclick="setFilter('ゲーム')">ゲーム</div>
            <div class="filter-chip" onclick="setFilter('ライフハック')">ライフハック</div>
        </div>
    </div>

    <div id="board" class="board-grid"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://good-95eb2-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let myExcludes = JSON.parse(localStorage.getItem('purifier_ultimate_v1')) || [];
    let allPosts = [];
    let currentFilter = 'すべて';

    function parseInput(str) { return str.split(/[\n,、\s]+/).map(s => s.trim()).filter(s => s !== ""); }

    function renderMyList() {
        localStorage.setItem('purifier_ultimate_v1', JSON.stringify(myExcludes));
        const display = document.getElementById('tagDisplay');
        display.innerHTML = myExcludes.map((t, i) => `<div class="tag">${t}<span onclick="removeTag(${i})">×</span></div>`).join('');
    }

    function addQuick() {
        const input = document.getElementById('quickInput');
        const items = parseInput(input.value);
        myExcludes = Array.from(new Set([...myExcludes, ...items]));
        input.value = '';
        renderMyList();
    }

    function removeTag(i) { myExcludes.splice(i, 1); renderMyList(); }
    function clearAll() { if(confirm("消去？")) { myExcludes = []; renderMyList(); } }

    database.ref('posts').on('value', (snapshot) => {
        const data = snapshot.val();
        allPosts = data ? Object.keys(data).map(key => ({id: key, ...data[key]})).reverse() : [];
        filterPosts();
    });

    function setFilter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.filter-chip').forEach(el => el.classList.toggle('active', el.innerText === cat));
        filterPosts();
    }

    function filterPosts() {
        const searchText = document.getElementById('boardSearch').value.toLowerCase();
        const board = document.getElementById('board');
        board.innerHTML = '';

        allPosts.filter(p => {
            const matchCat = currentFilter === 'すべて' || p.category === currentFilter;
            const matchText = p.title.toLowerCase().includes(searchText) || p.desc.toLowerCase().includes(searchText);
            return matchCat && matchText;
        }).forEach(post => {
            board.innerHTML += `
                <div class="post-card">
                    <div class="post-category">${post.category || '全般'}</div>
                    <button class="btn-delete" onclick="deletePost('${post.id}', '${post.pass}')" title="削除">×</button>
                    <div class="post-title">${post.title}</div>
                    <div class="post-desc">${post.desc}</div>
                    <button class="btn-apply" onclick="applyList(\`${post.list}\`)">このリストを合体</button>
                </div>`;
        });
    }

    function submitToFirebase() {
        const title = document.getElementById('postTitle').value.trim();
        const desc = document.getElementById('postDesc').value.trim();
        const category = document.getElementById('postCategory').value;
        const pass = document.getElementById('postPass').value;
        const listArr = parseInput(document.getElementById('postList').value);

        if(!title || listArr.length === 0) return alert("題名とリストは必須！");

        database.ref('posts').push({
            title, desc, category, pass, list: listArr.join(','), timestamp: Date.now()
        });

        document.getElementById('postTitle').value = '';
        document.getElementById('postDesc').value = '';
        document.getElementById('postList').value = '';
        document.getElementById('postPass').value = '';
        alert("公開しました！");
    }

    function deletePost(id, correctPass) {
        if (!correctPass || correctPass === "undefined") {
            alert("この投稿にはパスワードが設定されていないため削除できません。");
            return;
        }
        const userPass = prompt("削除パスワードを入力してください：");
        if (userPass === correctPass) {
            if (confirm("本当にこの投稿を削除しますか？")) {
                database.ref('posts').child(id).remove();
                alert("削除しました。");
            }
        } else if (userPass !== null) {
            alert("パスワードが違います。");
        }
    }

    function applyList(listStr) {
        myExcludes = Array.from(new Set([...myExcludes, ...listStr.split(',')]));
        renderMyList();
        alert("合体完了！");
    }

    function search() {
        const q = document.getElementById('mainQuery').value;
        if(!q) return;
        const cmd = myExcludes.map(i => i.includes('.') ? `-site:${i}` : `-${i}`).join(' ');
        window.open(`https://www.google.com/search?q=${encodeURIComponent(q + " " + cmd)}`, '_blank');
    }

    renderMyList();
</script>
</body>
</html>
